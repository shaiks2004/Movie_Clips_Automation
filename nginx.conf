server {
    listen 80;
    server_name localhost yourdomain.com;

    # Redirect all HTTP requests to HTTPS (production mode)
    # return 301 https://$host$request_uri;

    client_max_body_size 500M; # Match Flask upload limits

    location / {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering to allow real-time progressive upload feedback
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Cache static assets for performance
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
