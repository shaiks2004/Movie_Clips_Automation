{% extends "base.html" %}
{% block title %}Login — ClipMood{% endblock %}
{% block nav_login %}active{% endblock %}
{% block body %}
<div class="auth-wrap"><div class="auth-card reveal">
    <h1>Welcome back</h1><p class="sub">Log in to your ClipMood studio.</p>
    <div class="social-btns"><a href="/app" class="social-btn"><span>🔵</span> Continue with Google</a><a href="/app" class="social-btn"><span>🐙</span> Continue with GitHub</a></div>
    <div class="divider">or</div>
    <form onsubmit="event.preventDefault(); window.location.href='/app';">
        <div class="field"><label>Email</label><input class="form-input" type="email" placeholder="you@email.com" required></div>
        <div class="field"><label>Password</label><input class="form-input" type="password" placeholder="••••••••" required></div>
        <div class="flex between center mb-2" style="font-size:.82rem;"><label class="muted"><input type="checkbox"> Remember me</label><a href="/forgot" style="color:var(--primary);text-decoration:none;">Forgot password?</a></div>
        <button class="btn btn-primary full-btn" type="submit">Log In</button>
    </form>
    <p class="auth-foot">New here? <a href="/register">Create an account</a></p>
</div></div>
{% endblock %}
